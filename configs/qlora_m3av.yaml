# QLoRA fine-tuning config for M3AV dataset
# Usage: python tools/finetune.py --config configs/qlora_m3av.yaml
#
# Prerequisite: clone the M3AV dataset first:
#   git clone https://github.com/Jack-ZC8/M3AV-dataset ./data/m3av

# Model
model_name: e2b
load_in_4bit: true

# LoRA
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

# Dataset
dataset_name: m3av
dataset_split: train
max_seq_length: 2048

# Training
output_dir: ./checkpoints/qlora_m3av
num_train_epochs: 3
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
warmup_ratio: 0.1
lr_scheduler_type: cosine
bf16: true
logging_steps: 10
save_strategy: epoch
seed: 42
gradient_checkpointing: true
report_to: none

# GPU
gpu: 0
